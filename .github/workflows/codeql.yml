name: CodeQL Security Analysis

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    # Run CodeQL analysis daily at 02:00 UTC
    - cron: '0 2 * * *'

jobs:
  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['python']
        # CodeQL supports [ 'cpp', 'csharp', 'go', 'java', 'javascript', 'python', 'ruby' ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: ${{ matrix.language }}
          # CodeQL queries database location (for building compiled languages)
          db-location: '${{ runner.temp }}/codeql_databases'
          # Use queries suite from:
          # - "security-and-quality" (default - most comprehensive)
          # - "security-extended" (additional security rules)
          queries: security-and-quality

      # For compiled languages (C/C++/C#/Go/Java), CodeQL performs autobuild automatically
      # For interpreted languages (Python/Ruby), no autobuild needed

      - name: Set up Python for code analysis
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          category: "/language:${{ matrix.language }}"
          # Upload results to GitHub's code scanning
          upload: true

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: ${{ runner.temp }}/codeql_databases/python/results/python.sarif
          category: "CodeQL/${{ matrix.language }}"

  dependency-check:
    name: Dependency Security Check
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit safety

      - name: Run pip-audit
        continue-on-error: true
        run: |
          pip-audit --desc || true

      - name: Run safety check
        continue-on-error: true
        run: |
          safety check --json || true
