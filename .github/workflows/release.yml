name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
      draft:
        description: 'Create as draft release'
        required: false
        default: false

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest tests/ -v --cov=gcc_evolution

      - name: Check version
        run: |
          VERSION=$(git describe --tags --always)
          echo "Release version: $VERSION"
          grep -q "$VERSION" gcc_evolution/__init__.py || echo "Version mismatch warning"

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build distribution
        run: |
          python -m build

      - name: Check distribution
        run: |
          twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    environment:
      name: pypi
      url: https://pypi.org/project/gcc-evo/

    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          VERSION=$(git describe --tags --always)
          PREV_TAG=$(git tag --sort=-version:refname | head -n 2 | tail -n 1)
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git rev-list --oneline $(git rev-list --max-parents=0 HEAD)..HEAD)
          else
            COMMITS=$(git rev-list --oneline ${PREV_TAG}..HEAD)
          fi

          CHANGELOG=$(cat <<EOF
          ## Changes in $VERSION

          ### Features & Fixes
          EOF
          echo "$COMMITS" | while read -r commit; do
            echo "- $commit" >> changelog.md
          done

          cat changelog.md
          echo "changelog=$(cat changelog.md)" >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          name: dist
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: ${{ github.event.inputs.draft == 'true' }}
          files: dist/*
          body: |
            ## Release Notes

            ### What's New
            - See CHANGELOG.md for detailed updates
            - See commits below for implementation details

            ### Installation
            ```bash
            pip install gcc-evo
            # or upgrade
            pip install --upgrade gcc-evo
            ```

            ### Quick Start
            ```bash
            gcc-evo version
            gcc-evo init
            gcc-evo loop GCC-0001 --once
            ```

            ### Documentation
            - [README](https://github.com/baodexiang/gcc-evo#readme)
            - [QUICKSTART](https://github.com/baodexiang/gcc-evo/blob/main/opensource/QUICKSTART.md)
            - [TUTORIAL](https://github.com/baodexiang/gcc-evo/blob/main/opensource/TUTORIAL.md)
            - [CHANGELOG](https://github.com/baodexiang/gcc-evo/blob/main/opensource/CHANGELOG.md)

            ### Contributors
            Thanks to all contributors who made this release possible!

  notify:
    name: Notify release
    runs-on: ubuntu-latest
    needs: [publish, release]
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Release notification
        run: |
          VERSION=$(git describe --tags --always)
          echo "✅ Release $VERSION published successfully!"
          echo "📦 PyPI: https://pypi.org/project/gcc-evo/"
          echo "🔗 GitHub: https://github.com/baodexiang/gcc-evo/releases"

  rollback:
    name: Rollback on failure
    runs-on: ubuntu-latest
    needs: [validate, build, publish]
    if: failure()

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Delete failed release tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          TAG=$(git describe --tags --always)
          echo "Release $TAG failed. Manual intervention required."
          echo "Review logs and retry."

      - name: Send alert
        run: |
          echo "❌ Release build failed!"
          echo "Check workflow logs for details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
