name: Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    # Run tests daily at 00:00 UTC
    - cron: '0 0 * * *'

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 gcc_evolution/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings
          flake8 gcc_evolution/ --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics
        continue-on-error: true

      - name: Type check with mypy
        run: |
          mypy gcc_evolution/ --ignore-missing-imports || true
        continue-on-error: true

      - name: Run tests with pytest
        run: |
          pytest tests/ -v --cov=gcc_evolution --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Generate coverage report
        if: matrix.python-version == '3.11'
        run: |
          coverage report
          coverage html

      - name: Archive coverage reports
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 30

  security:
    name: Security checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run Bandit security scan
        run: |
          bandit -r gcc_evolution/ -f json -o bandit-report.json || true

      - name: Check dependencies with Safety
        run: |
          safety check --json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v3
        with:
          name: security-reports
          path: |
            bandit-report.json
          retention-days: 30

  lint:
    name: Code quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black isort pylint

      - name: Check formatting with Black
        run: |
          black --check gcc_evolution/ tests/ || echo "Format check failed"
        continue-on-error: true

      - name: Check import sorting with isort
        run: |
          isort --check-only gcc_evolution/ tests/ || echo "Import check failed"
        continue-on-error: true

      - name: Lint with pylint
        run: |
          pylint gcc_evolution/ --exit-zero --max-line-length=100
        continue-on-error: true

  docs:
    name: Documentation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sphinx sphinx-rtd-theme

      - name: Build documentation
        run: |
          cd docs
          make html || echo "Docs build failed"
        continue-on-error: true

      - name: Upload docs
        uses: actions/upload-artifact@v3
        with:
          name: documentation
          path: docs/_build/html/
          retention-days: 7

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v -s --tb=short
        continue-on-error: true
        env:
          TEST_MODE: integration

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [test, security, lint, docs, integration]

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test.result }}" = "failure" ]; then
            echo "::error::Tests failed"
            exit 1
          fi
          echo "✅ All tests passed"

      - name: Notify completion
        run: |
          echo "Test suite completed successfully!"
          echo "- Unit tests: ${{ needs.test.result }}"
          echo "- Security: ${{ needs.security.result }}"
          echo "- Code quality: ${{ needs.lint.result }}"
          echo "- Documentation: ${{ needs.docs.result }}"
