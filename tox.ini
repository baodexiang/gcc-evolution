[tox]
envlist =
    py39
    py310
    py311
    py312
    lint
    type
    docs
    coverage
skip_missing_interpreters = true

[testenv]
description = Run unit tests with pytest
deps =
    pytest>=7.0.0
    pytest-cov>=4.0.0
    pytest-xdist>=3.0.0
    pytest-timeout>=2.1.0
extras = dev
commands =
    pytest {posargs:tests/unit -v --cov=gcc_evolution --cov-report=term-missing}
setenv =
    PYTHONPATH = {toxinidir}
    COVERAGE_FILE = .coverage.{envname}

[testenv:integration]
description = Run integration tests
deps =
    {[testenv]deps}
extras = dev
commands =
    pytest {posargs:tests/integration -v -s}

[testenv:lint]
description = Run linting checks (flake8, pylint)
basepython = python3.11
deps =
    flake8>=5.0.0
    flake8-docstrings>=1.6.0
    flake8-bugbear>=22.0.0
    pylint>=2.15.0
skip_install = false
commands =
    flake8 {posargs:gcc_evolution tests}
    pylint {posargs:gcc_evolution}

[testenv:type]
description = Run type checking with mypy
basepython = python3.11
deps =
    mypy>=0.990
    types-PyYAML>=6.0
    types-requests>=2.28.0
commands =
    mypy {posargs:gcc_evolution --ignore-missing-imports}

[testenv:format]
description = Auto-format code with black and isort
basepython = python3.11
deps =
    black>=22.0.0
    isort>=5.11.0
commands =
    black {posargs:gcc_evolution tests}
    isort {posargs:gcc_evolution tests}

[testenv:format-check]
description = Check code formatting without making changes
basepython = python3.11
deps =
    black>=22.0.0
    isort>=5.11.0
commands =
    black --check {posargs:gcc_evolution tests}
    isort --check-only {posargs:gcc_evolution tests}

[testenv:security]
description = Run security checks (bandit, safety)
basepython = python3.11
deps =
    bandit>=1.7.0
    safety>=2.3.0
commands =
    bandit -r {posargs:gcc_evolution} -f json -o bandit-report.json
    safety check {posargs:--json}

[testenv:docs]
description = Build documentation with Sphinx
basepython = python3.11
changedir = docs
deps =
    sphinx>=5.0.0
    sphinx-rtd-theme>=1.0.0
    sphinx-autodoc-typehints>=1.19.0
extras = docs
commands =
    sphinx-build {posargs:-W -b html -d _build/doctrees . _build/html}

[testenv:coverage]
description = Generate coverage report
basepython = python3.11
deps =
    {[testenv]deps}
extras = dev
commands =
    coverage erase
    pytest tests/ --cov=gcc_evolution --cov-report=html --cov-report=term-missing
    coverage report --fail-under=80

[testenv:coverage-html]
description = Generate HTML coverage report and open in browser
basepython = python3.11
deps =
    {[testenv:coverage]deps}
commands =
    {[testenv:coverage]commands}
    python -m webbrowser htmlcov/index.html

[testenv:dev]
description = Development environment with all deps
basepython = python3.11
usedevelop = true
deps =
    {[testenv]deps}
    ipython>=8.0.0
    jupyter>=1.0.0
extras = dev,docs,local-llm
commands =
    python -c "print('Development environment ready. Type: ipython')"

# Pytest configuration
[pytest]
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests (deselect with '-m "not slow"')
    network: Tests requiring network access

# Coverage configuration
[coverage:run]
source = gcc_evolution
omit =
    */tests/*
    */test_*.py
    */__main__.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod
precision = 2

[coverage:html]
directory = htmlcov

# Flake8 configuration
[flake8]
max-line-length = 100
max-complexity = 10
exclude =
    .git
    __pycache__
    .tox
    .eggs
    *.egg
    build
    dist
    .venv
    venv
ignore =
    E203
    E266
    E501
    W503
per-file-ignores =
    __init__.py:F401

# isort configuration
[isort]
profile = black
multi_line_mode = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
line_length = 100
skip_gitignore = true

# Mypy configuration
[mypy]
python_version = 3.11
warn_return_any = true
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
pretty = true
show_error_context = true
strict_optional = true
ignore_missing_imports = true
